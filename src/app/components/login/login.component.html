<div class="login-container">
    <form [formGroup]="loginForm">
        <h2>Login</h2>
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" placeholder="Enter username">
        @if(loginForm.get('username')?.touched&&loginForm.get('username')?.invalid){
        <p class="invalid">*Invalid Username</p>
        }
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Enter password">
        @if(loginForm.get('password')?.touched&&loginForm.get('password')?.invalid){
        <p class="invalid">*Invalid Password</p>
        }

        <div class="role-group">
            <label>
            <input type="radio" name="role" value="Admin" formControlName="role">Admin
        </label>
        <label>
            <input type="radio" name="role" value="Executer" formControlName="role">Executer
        </label>
        </div>
        <button kendoButton (click)="login()">Login</button>
    </form>
</div>
